<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Аналіз контент-стратегії для зірочки</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #181b22;
      --card-light: #20242d;
      --text: #f4f4f5;
      --muted: #a1a1aa;
      --red: #dc2626;
      --red-dark: #991b1b;
      --yellow: #f59e0b;
      --border: #2f3542;
      --green: #22c55e;
      --blue: #38bdf8;
      --shadow: 0 18px 44px rgba(0, 0, 0, 0.28);
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background: radial-gradient(circle at 20% 0%, rgba(220, 38, 38, 0.16), transparent 34%), var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.55;
    }

    header {
      padding: 42px 24px 28px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, rgba(24, 27, 34, 0.98), rgba(15, 17, 21, 0.92));
    }

    .container {
      width: min(1240px, calc(100% - 32px));
      margin: 0 auto;
    }

    .topline {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text);
      background: #151821;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge.high { border-color: rgba(220, 38, 38, 0.7); color: #fecaca; background: rgba(153, 27, 27, 0.28); }
    .badge.medium { border-color: rgba(245, 158, 11, 0.7); color: #fde68a; background: rgba(245, 158, 11, 0.16); }
    .badge.low { border-color: rgba(56, 189, 248, 0.55); color: #bae6fd; background: rgba(56, 189, 248, 0.12); }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(32px, 5vw, 58px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0 0 16px;
      color: #e5e7eb;
      font-size: clamp(17px, 2vw, 23px);
      max-width: 980px;
    }

    .meta {
      color: var(--muted);
      font-size: 14px;
      max-width: 960px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
    }

    button {
      border: 0;
      color: var(--text);
      background: var(--red);
      border-radius: 8px;
      min-height: 40px;
      padding: 10px 14px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
    }

    button:hover { transform: translateY(-1px); background: #ef4444; }
    button.secondary { background: var(--card-light); border: 1px solid var(--border); }
    button.secondary:hover { background: #2a303b; }

    .tabs-wrap {
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid var(--border);
      background: rgba(15, 17, 21, 0.96);
      backdrop-filter: blur(14px);
    }

    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 12px 0;
      scrollbar-color: var(--red) var(--card);
    }

    .tab-btn {
      flex: 0 0 auto;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      min-height: 38px;
      padding: 9px 12px;
      font-size: 14px;
    }

    .tab-btn:hover, .tab-btn.active {
      color: var(--text);
      background: var(--red-dark);
      border-color: #ef4444;
    }

    main { padding: 28px 0 54px; }

    .section {
      display: none;
      animation: fadeIn 0.24s ease both;
    }

    .section.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 {
      margin: 0 0 16px;
      font-size: clamp(25px, 3vw, 36px);
      line-height: 1.2;
    }

    h3 {
      margin: 24px 0 12px;
      font-size: 22px;
    }

    p { color: #d4d4d8; }

    .lead {
      font-size: 18px;
      color: #e5e7eb;
      max-width: 1050px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin: 22px 0;
    }

    .card {
      background: linear-gradient(180deg, var(--card-light), var(--card));
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .card strong {
      display: block;
      margin-bottom: 8px;
      color: #ffffff;
      font-size: 17px;
